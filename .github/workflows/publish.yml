name: Publish

# Push a version tag (e.g. v0.1.1) → test, build, and publish to PyPI via
# Trusted Publishing (OIDC) — no token or secret is stored anywhere.
# One-time setup: on PyPI, project qbrin → Settings → Publishing → add a GitHub
# trusted publisher (owner: qbrin-stack, repo: qbrin-python, workflow: publish.yml).

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install .
      - run: python -m unittest discover -s tests -v

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC — PyPI Trusted Publishing (no token)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Tag must match the package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "tag=$TAG  pyproject=$VER"
          test "$TAG" = "$VER" || { echo "::error::tag v$TAG does not match pyproject version $VER"; exit 1; }
      - name: Build
        run: |
          python -m pip install build
          python -m build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
