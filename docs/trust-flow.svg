<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" width="860" height="340" font-family="system-ui, -apple-system, Segoe UI, sans-serif" role="img" aria-label="qbrin sits between an AI agent and an organisation's own sources. The animation cycles three domains — a payment agent, a biotech agent, and a security agent. In each, the agent asks a question, qbrin probes the org's live systems and knowledge, verifies every claim through its gate stack, and returns a decision back to the agent: REJECTED for an over-limit refund, VERIFIED for an in-range dose, and NEED MORE EVIDENCE for an access request with no approval on record.">
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b5bfd" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#3b5bfd" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#27409f"/><stop offset="1" stop-color="#141a3a"/>
    </radialGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#ffffff" stroke-opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="860" height="340" rx="16" fill="#0e1430"/>
  <rect width="860" height="340" rx="16" fill="url(#grid)"/>

  <!-- ============ static structure ============ -->
  <!-- connectors -->
  <g fill="none">
    <path d="M168,150 C214,146 254,150 300,158" stroke="url(#edge)" stroke-width="2"/>
    <path id="pQ" d="M168,150 C214,146 254,150 300,158" opacity="0"/>
    <path d="M476,150 C556,128 600,108 648,101" stroke="url(#edge)" stroke-width="2"/>
    <path d="M476,170 C556,170 600,171 648,171" stroke="url(#edge)" stroke-width="2"/>
    <path d="M476,190 C556,212 600,234 648,241" stroke="url(#edge)" stroke-width="2"/>
    <path id="p1" d="M476,150 C556,128 600,108 648,101" opacity="0"/>
    <path id="p2" d="M476,170 C556,170 600,171 648,171" opacity="0"/>
    <path id="p3" d="M476,190 C556,212 600,234 648,241" opacity="0"/>
    <path id="pV" d="M300,196 C240,224 190,232 160,236" opacity="0"/>
  </g>

  <!-- AI agent node -->
  <g>
    <rect x="20" y="110" width="150" height="92" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#96a8ff" stroke-opacity="0.28"/>
    <!-- robot glyph -->
    <g stroke="#8ca5ff" stroke-opacity="0.9" fill="none">
      <line x1="50" y1="132" x2="50" y2="140" stroke-width="2"/>
      <circle cx="50" cy="130" r="2.5" fill="#3b5bfd" stroke="none"/>
      <rect x="36" y="140" width="28" height="24" rx="6" fill="#101634" stroke-width="1.5"/>
    </g>
    <circle cx="45" cy="152" r="2.4" fill="#9fd91f"/><circle cx="55" cy="152" r="2.4" fill="#9fd91f"/>
    <text x="80" y="150" fill="#e8ebff" font-size="13" font-weight="700">AI agent</text>
    <!-- cycling agent type -->
    <text x="80" y="167" font-size="11" font-family="monospace" fill="#7fe0d3" opacity="0">payment agent<animate attributeName="opacity" dur="24s" repeatCount="indefinite" values="1;1;0;0;1" keyTimes="0;0.317;0.333;0.983;1"/></text>
    <text x="80" y="167" font-size="11" font-family="monospace" fill="#9fd91f" opacity="0">biotech agent<animate attributeName="opacity" dur="24s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.333;0.35;0.65;0.667;1"/></text>
    <text x="80" y="167" font-size="11" font-family="monospace" fill="#f2b64b" opacity="0">security agent<animate attributeName="opacity" dur="24s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.667;0.683;0.983;1"/></text>
  </g>

  <!-- verdict badge (returns to the agent; appears after the flow each scene) -->
  <g>
    <!-- payment → REJECTED -->
    <g opacity="0"><animate attributeName="opacity" dur="24s" repeatCount="indefinite" values="1;1;0;0;1" keyTimes="0;0.317;0.333;0.983;1"/>
      <g opacity="0"><animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.75;0.78;0.98;1"/>
        <rect x="20" y="214" width="150" height="42" rx="9" fill="rgba(255,107,95,0.15)" stroke="#ff6b5f"/>
        <text x="34" y="233" fill="#ff8f85" font-size="12" font-weight="800" letter-spacing="0.4">REJECTED</text>
        <text x="34" y="248" fill="#c7cdf0" font-size="10" font-family="monospace">$500 &gt; $300 limit</text>
      </g></g>
    <!-- biotech → VERIFIED -->
    <g opacity="0"><animate attributeName="opacity" dur="24s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.333;0.35;0.65;0.667;1"/>
      <g opacity="0"><animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.75;0.78;0.98;1"/>
        <rect x="20" y="214" width="150" height="42" rx="9" fill="rgba(159,217,31,0.14)" stroke="#9fd91f"/>
        <text x="34" y="233" fill="#b6ea4f" font-size="12" font-weight="800" letter-spacing="0.4">VERIFIED</text>
        <text x="34" y="248" fill="#c7cdf0" font-size="10" font-family="monospace">within approved range</text>
      </g></g>
    <!-- security → NEED MORE EVIDENCE -->
    <g opacity="0"><animate attributeName="opacity" dur="24s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.667;0.683;0.983;1"/>
      <g opacity="0"><animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.75;0.78;0.98;1"/>
        <rect x="20" y="214" width="150" height="42" rx="9" fill="rgba(242,182,75,0.14)" stroke="#f2b64b"/>
        <text x="34" y="231" fill="#f4c778" font-size="11" font-weight="800" letter-spacing="0.3">NEED MORE EVIDENCE</text>
        <text x="34" y="247" fill="#c7cdf0" font-size="10" font-family="monospace">no approval on record</text>
      </g></g>
  </g>

  <!-- question bubble (cycling per domain) -->
  <g>
    <rect x="176" y="14" width="470" height="30" rx="15" fill="rgba(120,140,255,0.10)" stroke="#8ca5ff" stroke-opacity="0.35"/>
    <text x="196" y="34" fill="#dfe4ff" font-size="12.5" font-weight="600" opacity="0">“Refund $500 on order ORD-200 for this customer?”<animate attributeName="opacity" dur="24s" repeatCount="indefinite" values="1;1;0;0;1" keyTimes="0;0.317;0.333;0.983;1"/></text>
    <text x="196" y="34" fill="#dfe4ff" font-size="12.5" font-weight="600" opacity="0">“Cleared to raise compound BX-12 to 50 mg in phase II?”<animate attributeName="opacity" dur="24s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.333;0.35;0.65;0.667;1"/></text>
    <text x="196" y="34" fill="#dfe4ff" font-size="12.5" font-weight="600" opacity="0">“Auto-approve production-database access for user kx?”<animate attributeName="opacity" dur="24s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.667;0.683;0.983;1"/></text>
  </g>

  <!-- qbrin engine -->
  <g>
    <rect x="300" y="70" width="176" height="200" rx="14" fill="url(#core)" stroke="#8ca5ff" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="388" y="106" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="800" letter-spacing="-0.5">qbrin</text>
    <text x="388" y="124" text-anchor="middle" fill="#aeb8ee" font-size="10" font-family="monospace">verification engine</text>
    <line x1="318" y1="136" x2="458" y2="136" stroke="#8ca5ff" stroke-opacity="0.25"/>
    <g font-family="monospace" font-size="11" fill="#c9cff2">
      <rect x="318" y="146" width="140" height="24" rx="7" fill="#ffffff" fill-opacity="0.05" stroke="#96a8ff" stroke-opacity="0.18"/><text x="340" y="162">claim-token</text>
      <path d="M327 158 l3.5 3.5 l6.5 -8" fill="none" stroke="#9fd91f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0"><animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.51;0.53;0.97;1"/></path>
      <rect x="318" y="178" width="140" height="24" rx="7" fill="#ffffff" fill-opacity="0.05" stroke="#96a8ff" stroke-opacity="0.18"/><text x="340" y="194">citation verifier</text>
      <path d="M327 190 l3.5 3.5 l6.5 -8" fill="none" stroke="#9fd91f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0"><animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.55;0.57;0.97;1"/></path>
      <rect x="318" y="210" width="140" height="24" rx="7" fill="#ffffff" fill-opacity="0.05" stroke="#96a8ff" stroke-opacity="0.18"/><text x="340" y="226">typed-claim</text>
      <path d="M327 222 l3.5 3.5 l6.5 -8" fill="none" stroke="#9fd91f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0"><animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.59;0.61;0.97;1"/></path>
    </g>
    <text x="388" y="256" text-anchor="middle" fill="#8f9ad6" font-size="9.5" font-family="monospace" letter-spacing="1">CITED · OR · ABSTAINS</text>
  </g>

  <!-- the org's sources (right) — boxes static, labels cycle per domain -->
  <g>
    <rect x="648" y="78" width="190" height="46" rx="10" fill="#ffffff" fill-opacity="0.045" stroke="#96a8ff" stroke-opacity="0.22"/><circle cx="668" cy="101" r="5" fill="#18b6a6"/>
    <rect x="648" y="148" width="190" height="46" rx="10" fill="#ffffff" fill-opacity="0.045" stroke="#96a8ff" stroke-opacity="0.22"/><circle cx="668" cy="171" r="5" fill="#3b5bfd"/>
    <rect x="648" y="218" width="190" height="46" rx="10" fill="#ffffff" fill-opacity="0.045" stroke="#96a8ff" stroke-opacity="0.22"/><circle cx="668" cy="241" r="5" fill="#f2b64b"/>
    <g font-size="13" font-weight="700" fill="#e8ebff">
      <g opacity="0"><animate attributeName="opacity" dur="24s" repeatCount="indefinite" values="1;1;0;0;1" keyTimes="0;0.317;0.333;0.983;1"/>
        <text x="684" y="105">orders API</text><text x="684" y="175">payments DB</text><text x="684" y="245">refund policy</text></g>
      <g opacity="0"><animate attributeName="opacity" dur="24s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.333;0.35;0.65;0.667;1"/>
        <text x="684" y="105">assay results</text><text x="684" y="175">trial records</text><text x="684" y="245">safety protocol</text></g>
      <g opacity="0"><animate attributeName="opacity" dur="24s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.667;0.683;0.983;1"/>
        <text x="684" y="105">IAM directory</text><text x="684" y="175">access logs</text><text x="684" y="245">security policy</text></g>
    </g>
  </g>

  <!-- ============ packets (constant, replay each 8s scene) ============ -->
  <!-- question: agent → qbrin -->
  <circle r="4.5" fill="#9fd91f" opacity="0">
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.05;0.06;0.14;0.15;1"/>
    <animateMotion dur="8s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.055;0.14;1" calcMode="linear"><mpath href="#pQ"/></animateMotion>
  </circle>
  <!-- probes: qbrin → sources -->
  <circle r="4.5" fill="#3b5bfd" opacity="0"><animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.17;0.18;0.27;0.28;1"/><animateMotion dur="8s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.18;0.27;1" calcMode="linear"><mpath href="#p1"/></animateMotion></circle>
  <circle r="4.5" fill="#3b5bfd" opacity="0"><animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.17;0.18;0.27;0.28;1"/><animateMotion dur="8s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.18;0.27;1" calcMode="linear"><mpath href="#p2"/></animateMotion></circle>
  <circle r="4.5" fill="#3b5bfd" opacity="0"><animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.17;0.18;0.27;0.28;1"/><animateMotion dur="8s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.18;0.27;1" calcMode="linear"><mpath href="#p3"/></animateMotion></circle>
  <!-- evidence: sources → qbrin (reverse) -->
  <circle r="4.5" fill="#18b6a6" opacity="0"><animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.35;0.36;0.46;0.47;1"/><animateMotion dur="8s" repeatCount="indefinite" keyPoints="1;1;0;0" keyTimes="0;0.36;0.46;1" calcMode="linear"><mpath href="#p1"/></animateMotion></circle>
  <circle r="4.5" fill="#3b5bfd" opacity="0"><animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.35;0.36;0.46;0.47;1"/><animateMotion dur="8s" repeatCount="indefinite" keyPoints="1;1;0;0" keyTimes="0;0.36;0.46;1" calcMode="linear"><mpath href="#p2"/></animateMotion></circle>
  <circle r="4.5" fill="#f2b64b" opacity="0"><animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.35;0.36;0.46;0.47;1"/><animateMotion dur="8s" repeatCount="indefinite" keyPoints="1;1;0;0" keyTimes="0;0.36;0.46;1" calcMode="linear"><mpath href="#p3"/></animateMotion></circle>
  <!-- verdict: qbrin → agent -->
  <circle r="5" fill="#dfe4ff" opacity="0"><animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.65;0.66;0.74;0.75;1"/><animateMotion dur="8s" repeatCount="indefinite" keyPoints="0;0;1;1" keyTimes="0;0.66;0.74;1" calcMode="linear"><mpath href="#pV"/></animateMotion></circle>
</svg>
